name: Semiconductor AI Agent

on:
  schedule:
    - cron: '37 21 * * 0-4'  # 如果你想保留 GitHub 自己的错峰备用定时器
  workflow_dispatch:         # 👈 这行最关键！允许外部 API (cron-job) 触发
  
jobs:
  run-agent:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: 检出代码
      uses: actions/checkout@v5

    - name: 设置 Python 环境
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 运行早盘分析 (北京时间 08:45)
      if: github.event.schedule == '45 0 * * 1-5'
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_AUTH_CODE: ${{ secrets.SENDER_AUTH_CODE }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: python gemini_agent.py morning

    - name: 运行盘后分析 (北京时间 16:00)
      if: github.event.schedule == '0 8 * * 1-5'
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_AUTH_CODE: ${{ secrets.SENDER_AUTH_CODE }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: python gemini_agent.py evening

    - name: 手动测试运行 (默认早盘逻辑)
      if: github.event_name == 'workflow_dispatch'
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_AUTH_CODE: ${{ secrets.SENDER_AUTH_CODE }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: python gemini_agent.py morning
