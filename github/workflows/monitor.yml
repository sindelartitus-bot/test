name: Semiconductor AI Agent

on:
  schedule:
    - cron: '45 0 * * 1-5'  # 北京时间 08:45
    - cron: '0 8 * * 1-5'   # 北京时间 16:00
  workflow_dispatch:

jobs:
  build_and_notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      # 增加了 google-generativeai 库的安装
      run: |
        python -m pip install --upgrade pip
        pip install pandas akshare yfinance requests google-generativeai

    - name: Run AI Agent
      # 完全套用你已有的统一变量名
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_AUTH_CODE: ${{ secrets.SENDER_AUTH_CODE }}
        RECEIVEREMAIL: ${{ secrets.RECEIVEREMAIL }}
      run: |
        python main.py
